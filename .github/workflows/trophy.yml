name: Generate trophy

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ryo-ma/github-profile-trophy@v1
        with:
          username: ${{ github.repository_owner }}
          theme: tokyonight
          no-frame: true
          row: 2
          column: 4
          output: profile/trophy.svg

      - name: Commit trophy
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/trophy.svg
          git commit -m "Update trophy card" || exit 0
          git push
